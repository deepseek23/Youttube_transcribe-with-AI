<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Transcript AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Background Texture -->
  <div class="bg-texture"></div>

  <div class="container">
    <!-- Sidebar / Control Panel -->
    <aside class="sidebar glass-panel">
      <div class="brand">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="23 7 16 12 23 17 23 7"></polygon>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
          </svg>
        </div>
        <h1>Video AI</h1>
      </div>

      <p class="description">Extract insights and chat with any YouTube video transcript using AI.</p>

      <div class="input-group">
        <label for="video-url">YouTube Video URL</label>
        <div class="input-wrapper">
          <input type="text" id="video-url" placeholder="https://youtube.com/watch?v=..." autocomplete="off">
        </div>
      </div>

      <button id="load-btn" class="primary-btn">
        <span class="btn-text">Load & Process Video</span>
        <span class="loader hidden"></span>
      </button>

      <div id="status-message" class="status-message hidden">
        <div class="status-icon"></div>
        <span class="status-text">Ready</span>
      </div>

      <div class="decorative-lines">
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-area glass-panel">
      <!-- Header -->
      <header class="chat-header">
        <h2>Transcript Chat</h2>
        <div class="connection-status">
          <div class="dot disconnected" id="connection-dot"></div>
          <span id="connection-text">Awaiting Video</span>
        </div>
      </header>

      <!-- Chat History -->
      <div class="chat-history" id="chat-history">
        <div class="message system">
          <div class="message-content">
            Hello. Please load a YouTube video URL from the sidebar to begin analyzing its transcript.
          </div>
        </div>
      </div>

      <!-- Chat Input -->
      <div class="chat-input-container">
        <form id="chat-form" class="chat-form">
          <input type="text" id="chat-input" placeholder="Ask a question about the video..." disabled
            autocomplete="off">
          <button type="submit" id="send-btn" class="icon-btn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </form>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
